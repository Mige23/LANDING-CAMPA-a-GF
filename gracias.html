<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gracias por tu demo</title>
  <style>
    body { margin:0; font-family: Inter, system-ui, -apple-system, sans-serif; background:#f7f7fb; color:#1a1a1a; }

    .card { max-width:600px; width:100%; background:#fff; border-radius:20px; box-shadow:0 24px 60px rgba(20,20,50,0.08); padding:40px; text-align:center; }
    h1 { font-size:2.4rem; margin-bottom:16px; }
    p { color:#4b5563; font-size:1rem; margin-bottom:24px; }
    .btn { display:inline-flex; align-items:center; justify-content:center; padding:14px 24px; border-radius:999px; background:#ff6b1a; color:#fff; font-weight:700; text-decoration:none; }
  </style>
  <script>
    if (typeof fbq === 'function') {
      fbq('track', 'Lead');
    }
  </script>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>¡Gracias!</h1>
      <p>Tu solicitud de demo ha sido enviada correctamente. Te contactamos muy pronto.</p>
      <a class="btn" href="/">Volver al sitio</a>
    </div>
  </div>
</body>
</html>
